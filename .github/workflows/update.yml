name: Update site data

on:
  schedule:
    - cron: '0 6 * * *'   # щодня о 06:00 UTC
  workflow_dispatch:        # ручний запуск з Actions UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: оновити products.json і telegram_posts.json
  # ─────────────────────────────────────────────────────────────
  update-data:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch products feed
        run: python scripts/fetch_feed.py

      - name: Fetch Telegram posts
        run: python scripts/fetch_telegram.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate catalog CSV
        run: node scripts/export_to_csv.js

      - name: Generate merchant feed
        run: node scripts/generate_merchant_feed.js

      - name: Commit updated data
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add products.json data/telegram_posts.json catalog_export.csv feed.xml
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Змін немає, пропускаємо комміт."
          else
            DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: update products and posts [$DATE]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────
  # Job 2: задеплоїти на GitHub Pages
  # ─────────────────────────────────────────────────────────────
  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # весь корінь репо → GitHub Pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
